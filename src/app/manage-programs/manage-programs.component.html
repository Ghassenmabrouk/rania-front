<div class="container page-container">
  <div class="page-header">
    <h2>Manage Programs</h2>
  </div>
  <button class="btn btn-primary action-button" (click)="addProgram()">➕ Add Program</button>
  <div *ngIf="loading" class="mt-3">Loading programs…</div>
  <table *ngIf="!loading && programs.length" class="table mt-3">
    <thead>
      <tr>
        <th>Name</th>
        <th>Capacity</th>
        <th>Enrolled</th>
        <th>Department</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of programs">
        <td>{{ p.name }}</td>
        <td>{{ p.capacity }}</td>
        <td>{{ p.enrolled }}</td>
        <td>{{ p.department || '-' }}</td>
      </tr>
    </tbody>
  </table>
  <p *ngIf="!loading && programs.length === 0" class="mt-3">No programs defined yet.</p>
</div>
